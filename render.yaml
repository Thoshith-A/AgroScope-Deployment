# AgroScope Backend — deploy on Render (https://render.com)
# Use "New" → "Blueprint" in Render and connect this repo to create the backend service.
services:
  - type: web
    name: agroscope-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
    # PORT is set by Render. Add in Dashboard: MONGODB_URI, JWT_SECRET, DEEPSEEK_API_KEY, TAVILY_API_KEY, etc. (see server/.env.example).
