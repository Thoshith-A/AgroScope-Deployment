  <body>
    <!-- Hidden Google Translate widget - we trigger it from our language selector -->
    <div id="google_translate_element" style="position:absolute;left:-9999px;width:1px;height:1px;overflow:hidden;" aria-hidden="true"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        if (typeof google === 'undefined' || !google.translate) return;
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'hi,ta,te,kn,ml,mr,gu,pa,bn,or,as,ur,en,zh-CN,ja,ko,ar,fr,de,es,pt,ru,it,tr,vi,th,id,ms,nl,pl,sv,no,da,fi,el,he,ro,hu,cs,sk,uk,hr,sr,bg,sw',
          layout: google.translate.TranslateElement.InlineLayout.HORIZONTAL,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
    <div id="root">
      <noscript>Enable JavaScript to run AgroScope.</noscript>
